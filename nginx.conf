# Reverse proxy: Next (/) + Nest API (/api/) + Socket.IO (/socket.io/)
# Mount: ./nginx.conf -> /etc/nginx/nginx.conf
#
# TLS: เพิ่ม server { listen 443 ssl; ... } และใบรองรับด้านนอก compose ได้

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20m;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream nest_api {
        server api:3000;
        keepalive 32;
    }

    upstream next_web {
        server web:3000;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # Nginx + stack liveness (Docker healthcheck)
        location = /nginx-health {
            access_log off;
            default_type text/plain;
            return 200 'ok';
        }

        # NestJS: health (direct path; global prefix /api, version /v1)
        location = /api/v1/health {
            proxy_pass http://nest_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # REST + เส้นทาง API อื่นของ Nest (รวม cookies refresh ที่ path /api/...)
        location /api/ {
            proxy_pass http://nest_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Socket.IO (same port กับ Nest)
        location /socket.io/ {
            proxy_pass http://nest_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Next.js
        location / {
            proxy_pass http://next_web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
