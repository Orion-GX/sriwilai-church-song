# Full stack: Postgres, Redis, Nest API, Next.js frontend, Nginx reverse proxy
#
# Setup:
#   cp .env.example .env
#   # แก้ secrets / โดเมน ใน .env
#
# Run:
#   docker compose build
#   docker compose up -d
#
# First-time / หลัง deploy (รัน migration จาก image production):
#   docker compose exec api yarn migration:run:prod
#
# Logs:
#   docker compose logs -f nginx api web

name: sriwilai-church-song

