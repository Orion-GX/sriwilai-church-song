  api:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    image: sriwilai-api:latest
    container_name: sriwilai-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_BASE_PATH: /api
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-church_chord_pro}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      DB_NAME: ${DB_NAME:-church_chord_pro}
      DB_SCHEMA: ${DB_SCHEMA:-public}
      DB_SSL: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
      REDIS_DB: ${REDIS_DB:-0}
      AUTH_ACCESS_TOKEN_SECRET: ${AUTH_ACCESS_TOKEN_SECRET:?min 32 chars}
      AUTH_REFRESH_TOKEN_SECRET: ${AUTH_REFRESH_TOKEN_SECRET:?min 32 chars}
      AUTH_ACCESS_TOKEN_EXPIRES_IN: ${AUTH_ACCESS_TOKEN_EXPIRES_IN:-15m}
      AUTH_REFRESH_TOKEN_EXPIRES_IN_DAYS: ${AUTH_REFRESH_TOKEN_EXPIRES_IN_DAYS:-30}
      AUTH_REFRESH_COOKIE_NAME: ${AUTH_REFRESH_COOKIE_NAME:-ccp_rt}
      AUTH_BCRYPT_SALT_ROUNDS: ${AUTH_BCRYPT_SALT_ROUNDS:-12}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_PRETTY: "false"
      THROTTLE_USE_REDIS: ${THROTTLE_USE_REDIS:-true}
      LIVE_WS_USE_REDIS_ADAPTER: ${LIVE_WS_USE_REDIS_ADAPTER:-false}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
        NEXT_PUBLIC_WS_ORIGIN: ${NEXT_PUBLIC_WS_ORIGIN:-}
    image: sriwilai-web:latest
    container_name: sriwilai-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: sriwilai-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
